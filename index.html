<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Bot</title>
</head>
<body>
    <form id="myForm">
        <input class="input" type="email" id="email" placeholder="Escribe tu correo electrónico"><br>
        <input class="input" type="password" id="password" placeholder="Escribe tu contraseña"><br>
        <input class="input" type="text" id="message" placeholder="Escribe tu mensaje"><br>
        <input class="input" type="date" id="date"><br>
        <button class="button" type="submit">Enviar</button>
    </form>
    <script src="app.js"></script>
</body>
</html>
